<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>M&S Technology - Updated</title>
    <meta name="description" content="M&S Technology supplies high-quality mechanical and electrical components to factories, contractors, and engineers across Egypt. 490+ Schneider Electric and ABB products in stock." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-B5SAXtCb.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BWolO3Ku.css">
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD&intent=capture" data-namespace="paypal_sdk" defer></script>
    
    <!-- Fawaterk Payment SDK -->
    <script src="https://app.fawaterk.com/static/js/fawaterk.js" defer></script>
    
    <style>
      #orca-security-badge {
        position: fixed;
        bottom: 24px;
        left: 24px;
        z-index: 9999;
        pointer-events: none;
        user-select: none;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 4px 18px rgba(0,0,0,0.20), 0 0 0 1.5px rgba(255,255,255,0.10);
        opacity: 0.85;
      }
      #orca-security-badge img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 50%;
      }
      @media (max-width: 600px) {
        #orca-security-badge {
          width: 64px;
          height: 64px;
          bottom: 16px;
          left: 16px;
        }
      }

      /* Remove dark overlay from hero video - allow full visibility */
      video[class*="object-cover"] {
        opacity: 0.85 !important;
      }
      div[class*="bg-gradient-to-b"][class*="from-[#0a1628]"] {
        opacity: 0.3 !important;
        background: linear-gradient(to bottom, rgba(10,22,40,0.2) 0%, rgba(10,22,40,0.1) 50%, rgba(10,22,40,0.3) 100%) !important;
      }
      
      /* Show hero text content */
      [code-path="src/sections/Hero.tsx:134:7"] {
        display: flex !important;
      }

      /* Payment buttons styling */
      .ms-payment-container {
        margin-top: 1rem;
        padding: 1rem;
        border-top: 1px solid #e5e7eb;
      }
      .ms-payment-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 0.5rem;
      }
      .ms-payment-btn.paypal {
        background: #0070ba;
        color: white;
        border: none;
      }
      .ms-payment-btn.paypal:hover {
        background: #005ea6;
      }
      .ms-payment-btn.fawaterk {
        background: #00d4aa;
        color: white;
        border: none;
      }
      .ms-payment-btn.fawaterk:hover {
        background: #00b894;
      }
      .ms-payment-label {
        font-size: 0.75rem;
        color: #6b7280;
        text-align: center;
        margin-bottom: 0.5rem;
      }
      
      /* Video showcase section */
      .ms-video-showcase {
        position: relative;
        width: 100%;
        overflow: hidden;
        background: #0a1628;
      }
      .ms-video-showcase video {
        width: 100%;
        height: auto;
        display: block;
      }
      .ms-video-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 2rem;
        background: linear-gradient(to top, rgba(10,22,40,0.9) 0%, transparent 100%);
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="orca-security-badge" aria-hidden="true">
      <img src="/images/orca-badge.png" alt="ORCA Security" />
    </div>
    
    <!-- Hero Video Enhancement Script -->
    <script>
      (function() {
        // Wait for React app to mount, then enhance hero
        const enhanceHero = function() {
          const videos = document.querySelectorAll('video');
          videos.forEach(function(v) {
            if (v.src && v.src.includes('archive.org')) {
              // Increase video visibility
              v.style.opacity = '0.9';
              v.parentElement.querySelectorAll('[class*="bg-gradient"]').forEach(function(el) {
                el.style.opacity = '0.25';
              });
            }
          });
          
          // Show hero content
          const heroContent = document.querySelector('[code-path="src/sections/Hero.tsx:134:7"]');
          if (heroContent) {
            heroContent.style.display = 'flex';
          }
        };
        
        // Run after app loads
        window.addEventListener('load', function() {
          setTimeout(enhanceHero, 1500);
          setTimeout(enhanceHero, 3000);
        });
      })();
    </script>
    
    <!-- Payment Integration Script -->
    <script>
      (function() {
        window.MS_PAYMENT_CONFIG = {
          paypal: {
            clientId: 'sb', // Replace with live client ID
            currency: 'USD',
            enabled: true
          },
          fawaterk: {
            apiKey: '', // Add your Fawaterk API key
            enabled: true,
            vendorKey: ''
          }
        };
        
        // Initialize payment buttons on cart/checkout
        window.initPaymentButtons = function(container, totalAmount, onSuccess) {
          container.innerHTML = '';
          
          var label = document.createElement('div');
          label.className = 'ms-payment-label';
          label.textContent = 'Secure Payment Options';
          container.appendChild(label);
          
          // PayPal Button
          if (window.MS_PAYMENT_CONFIG.paypal.enabled && window.paypal_sdk) {
            var paypalBtn = document.createElement('div');
            paypalBtn.className = 'ms-payment-btn paypal';
            paypalBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.96 5.029-4.367 6.797-8.68 6.797h-2.03a.64.64 0 0 0-.632.54l-.79 5.284-.252 1.602a.64.64 0 0 1-.623.539z"/></svg> Pay with PayPal';
            paypalBtn.onclick = function() {
              window.paypal_sdk.Buttons({
                createOrder: function(data, actions) {
                  return actions.order.create({
                    purchase_units: [{ amount: { value: (totalAmount / 30).toFixed(2) } }]
                  });
                },
                onApprove: function(data, actions) {
                  return actions.order.capture().then(function(details) {
                    if (onSuccess) onSuccess('paypal', details);
                  });
                }
              }).render(paypalBtn);
            };
            container.appendChild(paypalBtn);
          }
          
          // Fawaterk Button
          if (window.MS_PAYMENT_CONFIG.fawaterk.enabled) {
            var fawaterkBtn = document.createElement('button');
            fawaterkBtn.className = 'ms-payment-btn fawaterk';
            fawaterkBtn.innerHTML = 'Pay with Fawaterk (Visa/Mastercard/Fawry)';
            fawaterkBtn.onclick = function() {
              if (typeof Fawaterk !== 'undefined') {
                Fawaterk.init({
                  amount: totalAmount,
                  currency: 'EGP',
                  onSuccess: function(data) { if (onSuccess) onSuccess('fawaterk', data); },
                  onError: function(err) { alert('Payment failed: ' + err.message); }
                }).open();
              } else {
                alert('Fawaterk payment loading... Please try again in a moment.');
              }
            };
            container.appendChild(fawaterkBtn);
          }
        };
      })();
    </script>
  </body>
</html>
